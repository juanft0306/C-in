<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C🌍in · Importa y Vende</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container">
      <div class="logo">
        <span class="logo-icon">C🌍in</span>
        <span class="logo-tagline">Importa · Calcula · Crece</span>
      </div>
      <div class="header-actions">
        <button class="btn btn-outline" id="btnRefresh">
          <i class="fas fa-sync-alt"></i> Actualizar
        </button>
      </div>
    </div>
  </header>

  <!-- CONTENEDOR PRINCIPAL (se llena con main.html) -->
  <main class="container" id="mainContainer">
    <!-- El contenido se carga dinámicamente -->
    <div style="text-align:center; padding:40px; color:var(--text-secondary);">
      <i class="fas fa-spinner fa-spin" style="font-size:2rem;"></i>
      <p>Cargando...</p>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2025 C🌍in · Hecho con <i class="fas fa-heart" style="color:#e74c3c;"></i> para importadores venezolanos</p>
    </div>
  </footer>

  <!-- SCRIPTS -->
  <!-- Primero core.js (lógica) -->
  <script src="core.js"></script>
  <!-- Luego ui.js (interfaz) -->
  <script src="ui.js"></script>
  <!-- Finalmente, el cargador de contenido -->
  <script>
    // Cargar main.html y reemplazar el contenido del contenedor
    fetch('main.html')
      .then(response => {
        if (!response.ok) throw new Error('No se pudo cargar main.html');
        return response.text();
      })
      .then(html => {
        document.getElementById('mainContainer').innerHTML = html;
        // Inicializar la UI después de cargar el contenido
        if (typeof iniciarUI === 'function') {
          iniciarUI();
        }
      })
      .catch(error => {
        document.getElementById('mainContainer').innerHTML = `
          <div style="text-align:center; padding:40px; color:#e74c3c;">
            <i class="fas fa-exclamation-triangle" style="font-size:2rem;"></i>
            <p>Error al cargar la interfaz: ${error.message}</p>
            <p>Verifica que el archivo <strong>main.html</strong> exista en la carpeta public.</p>
          </div>
        `;
        console.error(error);
      });
  </script>

</body>
</html>
