<!-- ========================================== -->
<!-- PANTALLA: INVENTARIO                        -->
<!-- ========================================== -->

<div class="card">
  <div class="card-header">
    <h2><i class="fas fa-warehouse"></i> Inventario</h2>
    <span class="badge" id="stockCount">0 unidades</span>
  </div>

  <!-- Resumen -->
  <div style="display:flex; gap:16px; flex-wrap:wrap; margin-bottom:16px; background:var(--glass-bg); padding:12px 16px; border-radius:12px; border:1px solid var(--border-color);">
    <div>
      <span style="color:var(--text-secondary); font-size:0.7rem;">Valor total</span>
      <div style="font-size:1.3rem; font-weight:700; color:var(--gold);" id="valorTotal">$0.00</div>
    </div>
    <div>
      <span style="color:var(--text-secondary); font-size:0.7rem;">Productos distintos</span>
      <div style="font-size:1.3rem; font-weight:700;" id="totalProductos">0</div>
    </div>
  </div>

  <!-- Tabla de inventario -->
  <div id="inventarioContainer">
    <div class="empty-state">
      <i class="fas fa-boxes"></i>
      <p>No hay productos en el inventario.</p>
    </div>
  </div>
</div>
