<!-- ========================================== -->
<!-- PANTALLA: SONDEO DE PRODUCTOS               -->
<!-- ========================================== -->

<div class="card">
  <div class="card-header">
    <h2><i class="fas fa-search-dollar"></i> Sondeo de productos</h2>
    <span class="badge" id="sondeoCount">0 productos</span>
  </div>

  <!-- Formulario para agregar producto en sondeo -->
  <form id="sondeoForm" style="margin-bottom:20px; padding:16px; background:var(--glass-bg); border-radius:12px; border:1px solid var(--border-color);">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="form-group">
        <label><i class="fas fa-tag"></i> Nombre *</label>
        <input type="text" id="sondeoNombre" placeholder="Ej: Cargador USB-C 20W" required />
      </div>
      <div class="form-group">
        <label><i class="fas fa-dollar-sign"></i> Precio estimado (USD) *</label>
        <input type="number" id="sondeoPrecio" step="0.01" placeholder="15.00" required />
      </div>
      <div class="form-group" style="grid-column:1/-1;">
        <label><i class="fas fa-align-left"></i> Descripción</label>
        <input type="text" id="sondeoDescripcion" placeholder="Breve descripción" />
      </div>
      <div class="form-group">
        <label><i class="fas fa-dollar-sign"></i> Costo estimado (USD)</label>
        <input type="number" id="sondeoCostos" step="0.01" placeholder="8.00" value="0" />
      </div>
      <div class="form-group">
        <label><i class="fas fa-users"></i> Competidores</label>
        <input type="number" id="sondeoCompetidores" step="1" placeholder="0" value="0" />
      </div>
    </div>
    <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:12px;">
      <button type="submit" class="btn btn-primary"><i class="fas fa-plus-circle"></i> Agregar</button>
    </div>
  </form>

  <!-- Resumen -->
  <div style="display:flex; gap:16px; flex-wrap:wrap; margin-bottom:16px; padding:12px 16px; background:var(--glass-bg); border-radius:12px; border:1px solid var(--border-color);">
    <div><span style="color:var(--text-secondary);font-size:0.7rem;">En evaluación</span><br><span id="totalSondeo" style="font-weight:700;">0</span></div>
    <div><span style="color:var(--text-secondary);font-size:0.7rem;">✅ Recomendados</span><br><span id="sondeoRecomendados" style="font-weight:700; color:#2ecc71;">0</span></div>
    <div><span style="color:var(--text-secondary);font-size:0.7rem;">⚠️ Evaluar</span><br><span id="sondeoEvaluar" style="font-weight:700; color:#f1c40f;">0</span></div>
    <div><span style="color:var(--text-secondary);font-size:0.7rem;">❌ Descartar</span><br><span id="sondeoDescartar" style="font-weight:700; color:#e74c3c;">0</span></div>
  </div>

  <div id="sondeoList">
    <div class="empty-state">
      <i class="fas fa-search"></i>
      <p>No hay productos en sondeo.</p>
    </div>
  </div>
</div>
