<!-- ========================================== -->
<!-- PANTALLA: ESTACIONALIDAD                   -->
<!-- ========================================== -->

<div class="card">
  <div class="card-header">
    <h2><i class="fas fa-calendar-alt"></i> Estacionalidad de productos</h2>
    <span class="badge" id="estacionalidadCount">0 productos</span>
  </div>

  <!-- Filtros -->
  <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;">
    <button class="btn btn-small filter-btn active" data-filter="todos" onclick="window.filtrarEstacionalidad('todos')">Todos</button>
    <button class="btn btn-small filter-btn" data-filter="productos" onclick="window.filtrarEstacionalidad('productos')">📦 Productos</button>
    <button class="btn btn-small filter-btn" data-filter="sondeos" onclick="window.filtrarEstacionalidad('sondeos')">🔍 Sondeos</button>
  </div>

  <!-- Resumen global -->
  <div style="display:flex; gap:16px; flex-wrap:wrap; margin-bottom:16px; padding:12px 16px; background:var(--glass-bg); border-radius:12px; border:1px solid var(--border-color);">
    <div><span style="color:var(--text-secondary);font-size:0.7rem;">Productos con datos</span><br><span id="estProdConDatos" style="font-weight:700;">0</span></div>
    <div><span style="color:var(--text-secondary);font-size:0.7rem;">Sondeos con datos</span><br><span id="estSondeosConDatos" style="font-weight:700;">0</span></div>
    <div><span style="color:var(--text-secondary);font-size:0.7rem;">Mes más popular</span><br><span id="estMesPopular" style="font-weight:700; color:var(--gold);">-</span></div>
  </div>

  <!-- Lista de estacionalidad -->
  <div id="estacionalidadList">
    <div class="empty-state">
      <i class="fas fa-calendar"></i>
      <p>No hay datos de estacionalidad. Registra ventas, preguntas o interacciones para empezar.</p>
    </div>
  </div>
</div>
